<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AInonymous - Carte des Nœuds + Cercles d'Influence</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #f0eff8; margin: 0; padding: 20px; }
    #map { height: 620px; border-radius: 12px; border: 1px solid #2a2a3a; }
    .controls { background: #12121a; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    h1 { color: #7c6deb; }
    .leaflet-popup-content-wrapper { background: #1a1a28; color: #f0eff8; }
  </style>
</head>
<body>

<div style="max-width: 1100px; margin: 0 auto;">
  <h1>🌍 Carte des Nœuds + Cercles d'Influence</h1>
  <p>Gestion des superpositions et conflits visuels</p>

  <div class="controls">
    <label><input type="checkbox" id="showCircles" checked onchange="toggleCircles()"> Afficher les cercles d'influence</label>
    <br><br>

    <strong>Poids du scoring</strong><br>
    VRAM <input type="range" id="vram" min="0" max="50" value="35" oninput="updateVisualization()"> <span id="vramVal">35</span>% &nbsp;
    Load <input type="range" id="load" min="0" max="40" value="25" oninput="updateVisualization()"> <span id="loadVal">25</span>% &nbsp;
    Slots <input type="range" id="slots" min="0" max="30" value="15" oninput="updateVisualization()"> <span id="slotsVal">15</span>% &nbsp;
    <strong>Géo</strong> <input type="range" id="geo" min="0" max="25" value="15" oninput="updateVisualization()"> <span id="geoVal">15</span>%
    <br><br>
    <button onclick="resetWeights()" style="background:#5dd8a8;color:#0a0a0f;border:none;padding:8px 16px;border-radius:6px;font-weight:600;cursor:pointer;">
      Réinitialiser les poids
    </button>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let nodes = [
  { id: "node-paris",     vram: 24, load: 0.25, slots: 5, lat: 48.8566, lon: 2.3522 },
  { id: "node-frankfurt", vram: 20, load: 0.35, slots: 6, lat: 50.1109, lon: 8.6821 },
  { id: "node-nyc",       vram: 32, load: 0.55, slots: 4, lat: 40.7128, lon: -74.0060 },
  { id: "node-tokyo",     vram: 18, load: 0.15, slots: 7, lat: 35.6895, lon: 139.6917 },
  { id: "node-singapore", vram: 22, load: 0.40, slots: 5, lat: 1.3521, lon: 103.8198 },
];

let map, markers = [], circles = [];
let weights = { vram: 35, load: 25, slots: 15, geo: 15 };
const refLat = 48.8566, refLon = 2.3522;
let circlesVisible = true;

function calculateScore(node) {
  const vramS = Math.min(node.vram / 24, 1) * weights.vram;
  const loadS = (1 - Math.min(Math.max(node.load, 0), 1)) * weights.load;
  const slotsS = Math.min(node.slots / 8, 1) * weights.slots;

  const dist = Math.hypot(node.lat - refLat, node.lon - refLon) * 85;
  const geoS = Math.max(0, weights.geo * (1 - Math.min(dist / 130, 1)));

  return Math.round(vramS + loadS + slotsS + geoS);
}

function getColor(score) {
  if (score >= 75) return "#22c55e";
  if (score >= 55) return "#eab308";
  return "#ef4444";
}

function updateVisualization() {
  weights.vram = +document.getElementById("vram").value;
  weights.load = +document.getElementById("load").value;
  weights.slots = +document.getElementById("slots").value;
  weights.geo = +document.getElementById("geo").value;

  document.getElementById("vramVal").textContent = weights.vram;
  document.getElementById("loadVal").textContent = weights.load;
  document.getElementById("slotsVal").textContent = weights.slots;
  document.getElementById("geoVal").textContent = weights.geo;

  markers.forEach((marker, i) => {
    const node = marker.nodeData;
    const score = calculateScore(node);
    const color = getColor(score);

    marker.setIcon(L.divIcon({
      className: "custom-marker",
      html: `<div style="background:${color};width:20px;height:20px;border-radius:50%;border:3px solid white;box-shadow:0 0 8px rgba(0,0,0,0.6);"></div>`,
      iconSize: [20, 20],
      iconAnchor: [10, 10]
    }));

    marker.getPopup().setContent(`
      <div style="min-width:160px">
        <strong>${node.id}</strong><br>
        <strong>Score: ${score}</strong><br>
        VRAM: ${node.vram} GB &nbsp;|&nbsp; Load: ${(node.load*100).toFixed(0)}%<br>
        Slots disponibles: ${node.slots}
      </div>
    `);

    if (circles[i]) {
      const radius = Math.max(60, score * 3.8);
      circles[i].setRadius(radius);
      circles[i].setStyle({ color: color, fillColor: color, fillOpacity: 0.12 });
    }
  });
}

function toggleCircles() {
  circlesVisible = document.getElementById("showCircles").checked;
  circles.forEach(circle => {
    if (circlesVisible) {
      circle.addTo(map);
    } else {
      circle.remove();
    }
  });
}

function initMap() {
  map = L.map('map').setView([25, 20], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  nodes.forEach((node, index) => {
    const score = calculateScore(node);
    const color = getColor(score);

    const marker = L.marker([node.lat, node.lon], {
      icon: L.divIcon({
        className: "custom-marker",
        html: `<div style="background:${color};width:20px;height:20px;border-radius:50%;border:3px solid white;box-shadow:0 0 8px rgba(0,0,0,0.6);"></div>`,
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      })
    }).addTo(map);

    marker.bindPopup(`
      <div style="min-width:160px">
        <strong>${node.id}</strong><br>
        <strong>Score: ${score}</strong><br>
        VRAM: ${node.vram} GB &nbsp;|&nbsp; Load: ${(node.load*100).toFixed(0)}%<br>
        Slots disponibles: ${node.slots}
      </div>
    `);

    // Hover → bring marker and circle to front
    marker.on('mouseover', function () {
      marker.bringToFront();
      if (circles[index]) circles[index].bringToFront();
    });

    marker.nodeData = node;
    markers.push(marker);

    // Cercle d'influence
    const radius = Math.max(60, score * 3.8);
    const circle = L.circle([node.lat, node.lon], {
      color: color,
      fillColor: color,
      fillOpacity: 0.12,
      weight: 1.5
    }).addTo(map);

    // Hover sur le cercle aussi
    circle.on('mouseover', function () {
      circle.bringToFront();
      marker.bringToFront();
    });

    circles.push(circle);
  });

  // Sliders
  ['vram','load','slots','geo'].forEach(id => {
    const slider = document.getElementById(id);
    document.getElementById(id + 'Val').textContent = slider.value;
    slider.oninput = updateVisualization;
  });
}

function updateVisualization() {
  updateVisualization();
}

function resetWeights() {
  document.getElementById("vram").value = 35;
  document.getElementById("load").value = 25;
  document.getElementById("slots").value = 15;
  document.getElementById("geo").value = 15;
  updateVisualization();
}

window.onload = initMap;
</script>
</body>
</html>
