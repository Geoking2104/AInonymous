name: CI

# Déclencheurs :
#   - push sur main et toutes branches feat/**
#   - PR ciblant main
on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — Vérification rapide (~3 min avec cache)
  #
  # cargo check : valide la compilation sans linker — suffit pour valider les
  # types, les imports et la logique Serde sans avoir à attendre le link.
  # cargo test ainonymous-quic : 3 tests mTLS handshake (rapide, pure Rust).
  # clippy : informatif (continue-on-error), pas bloquant.
  #
  # Dépendance C : aws-lc-sys nécessite cmake + clang même en `check` (build.rs).
  # cmake est pré-installé sur ubuntu-latest ; on ajoute clang pour être sûr.
  # ─────────────────────────────────────────────────────────────────────────────
  check:
    name: check + tests QUIC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo (check)
        uses: Swatinem/rust-cache@v2

      - name: Dépendances C (aws-lc-sys + keyring dbus)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake clang libclang-dev libdbus-1-dev pkg-config

      - name: cargo check --workspace
        run: cargo check --workspace

      - name: cargo test ainonymous-quic (mTLS handshake)
        run: cargo test --package ainonymous-quic --verbose

      - name: clippy --workspace (informatif)
        run: cargo clippy --workspace -- -A dead_code -A unused
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — Build + tests daemon (~15 min première run, ~3 min avec cache)
  #
  # Nécessite le link complet → libsqlite3-dev pour holochain_sqlite/rusqlite,
  # pkg-config pour openssl/reqwest, perl pour le build aws-lc-sys.
  #
  # Inclut cargo test --package ainonymous-daemon : 4 tests unitaires sur
  # QuicListenerSignal (T3.1/T3.2) — signal parsing + offer.client_pubkey wiring.
  #
  # Ce job tourne après `check` (si check ✓).
  # ─────────────────────────────────────────────────────────────────────────────
  build-daemon:
    name: build daemon + signal tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Dépendances C (link complet)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake clang libclang-dev \
            libsqlite3-dev pkg-config \
            perl libssl-dev

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo (daemon — clé séparée pour éviter collision avec check)
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: daemon

      - name: cargo build --package ainonymous-daemon
        run: cargo build --package ainonymous-daemon

      - name: cargo test --package ainonymous-daemon (signal parsing)
        run: cargo test --package ainonymous-daemon

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 — Build WASM zomes (~10 min première run, ~1 min avec cache)
  #
  # Workspace séparé : dnas/ainonymous-core (Cargo.lock indépendant).
  # Pure Rust vers wasm32-unknown-unknown — pas de C deps.
  # Valide que les zomes compilent après les changements T3.1 (QuicListenerSignal).
  # ─────────────────────────────────────────────────────────────────────────────
  build-wasm:
    name: zomes → wasm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust stable + cible wasm32
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo (WASM)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dnas/ainonymous-core -> target
          key: wasm

      - name: Build zomes WASM
        working-directory: dnas/ainonymous-core
        # getrandom="custom" fourni par dnas/ainonymous-core/.cargo/config.toml
        run: cargo build --release --target wasm32-unknown-unknown

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4 — Smoke test repack-happ.py (T3.3)
  #
  # Vérifie que le repacker Python peut relire les .dna sans erreur.
  # Ne nécessite pas les WASMs compilés : teste uniquement la logique msgpack+gzip.
  # Rapide (~30s).
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-repack:
    name: repack-happ.py (T3.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer msgpack
        run: pip install msgpack

      - name: Vérifier que repack-happ.py parse correctement
        run: |
          python3 - <<'EOF'
          # Vérifie l'import et les helpers sans avoir besoin des .dna réels.
          import sys
          sys.argv = ['repack-happ.py', '--help']
          try:
              import subprocess, pathlib
              result = subprocess.run(
                  ['python3', 'scripts/repack-happ.py', '--help'],
                  capture_output=True, text=True
              )
              print(result.stdout or result.stderr)
              # --help doit sortir avec code 0
              assert result.returncode == 0, f"returncode={result.returncode}"
              print("✓ repack-happ.py --help OK")
          except AssertionError as e:
              print(f"FAIL: {e}"); sys.exit(1)
          EOF
